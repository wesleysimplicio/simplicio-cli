{
  "name": "crud-resource",
  "description": "Gin JSON CRUD routes for one resource.",
  "applies_to": ["go-gin"],
  "matches": [
    "(?i)\\bCRUD\\s+app\\s+for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*(?:\\s+[A-Za-z][A-Za-z0-9_-]*){0,2})(?=\\s+with\\b|\\s*$)",
    "(?i)\\bCRUD\\s+(?:API\\s+)?(?:for\\s+)?(?:managing\\s+)?(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b",
    "(?i)\\bREST\\s+(?:API\\s+)?for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b"
  ],
  "slots": {
    "entity": {"required": true, "transform": "pascal_case"},
    "entity_lower": {"derived_from": "entity", "transform": "lower_snake_case"},
    "entity_plural": {"derived_from": "entity", "transform": "plural_lower"}
  },
  "rationale": "Use the go-gin CRUD recipe for {entity}: route handlers are deterministic for this stack.",
  "files_to_create": [
    {"path": "internal/http/router.go", "purpose": "Gin router and CRUD handlers for {entity}"}
  ],
  "tasks": [
    {
      "id": "T01-gin-crud",
      "depends_on": [],
      "goal": "Implement Gin CRUD routes for {entity}.",
      "target": "internal/http/router.go",
      "criteria": "- list, create, and read routes are present\\n- route prefix is /{entity_plural}\\n- router stays compatible with the health route test",
      "constraints": "- keep the service self-contained and typed",
      "verify": "go test ./..."
    }
  ],
  "deps_to_install": [],
  "deps_dev": [],
  "test_command": "go test ./...",
  "lint_command": "go vet ./..."
}
