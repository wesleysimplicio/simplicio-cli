{
  "name": "crud-resource",
  "description": "Axum JSON CRUD routes for one resource.",
  "applies_to": ["rust-axum"],
  "matches": [
    "(?i)\\bCRUD\\s+app\\s+for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*(?:\\s+[A-Za-z][A-Za-z0-9_-]*){0,2})(?=\\s+with\\b|\\s*$)",
    "(?i)\\bCRUD\\s+(?:API\\s+)?(?:for\\s+)?(?:managing\\s+)?(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b",
    "(?i)\\bREST\\s+(?:API\\s+)?for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b"
  ],
  "slots": {
    "entity": {"required": true, "transform": "pascal_case"},
    "entity_lower": {"derived_from": "entity", "transform": "lower_snake_case"},
    "entity_plural": {"derived_from": "entity", "transform": "plural_lower"}
  },
  "rationale": "Use the rust-axum CRUD recipe for {entity}: route handlers and compile-time tests are deterministic for this stack.",
  "files_to_create": [
    {"path": "src/main.rs", "purpose": "Axum router, CRUD handlers, and route tests for {entity}"}
  ],
  "tasks": [
    {
      "id": "T01-axum-crud",
      "depends_on": [],
      "goal": "Implement Axum CRUD routes for {entity}.",
      "target": "src/main.rs",
      "criteria": "- list and create routes are present\\n- route prefix is /{entity_plural}\\n- route tests cover health and CRUD status",
      "constraints": "- keep the service self-contained and typed",
      "verify": "cargo test"
    }
  ],
  "deps_to_install": [],
  "deps_dev": [],
  "test_command": "cargo test",
  "lint_command": "cargo clippy --all-targets -- -D warnings"
}
