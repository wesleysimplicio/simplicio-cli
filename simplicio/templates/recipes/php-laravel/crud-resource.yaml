{
  "name": "crud-resource",
  "description": "Laravel JSON CRUD routes for one resource.",
  "applies_to": ["php-laravel"],
  "matches": [
    "(?i)\\bCRUD\\s+app\\s+for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*(?:\\s+[A-Za-z][A-Za-z0-9_-]*){0,2})(?=\\s+with\\b|\\s*$)",
    "(?i)\\bCRUD\\s+(?:API\\s+)?(?:for\\s+)?(?:managing\\s+)?(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b",
    "(?i)\\bREST\\s+(?:API\\s+)?for\\s+(?P<entity>[A-Za-z][A-Za-z0-9_-]*)\\b"
  ],
  "slots": {
    "entity": {"required": true, "transform": "pascal_case"},
    "entity_lower": {"derived_from": "entity", "transform": "lower_snake_case"},
    "entity_plural": {"derived_from": "entity", "transform": "plural_lower"}
  },
  "rationale": "Use the php-laravel CRUD recipe for {entity}: JSON API routes are deterministic for this stack.",
  "files_to_create": [
    {"path": "routes/api.php", "purpose": "Laravel JSON CRUD routes for {entity}"}
  ],
  "tasks": [
    {
      "id": "T01-laravel-routes",
      "depends_on": [],
      "goal": "Implement Laravel JSON CRUD routes for {entity}.",
      "target": "routes/api.php",
      "criteria": "- list, create, and read routes are present\\n- route prefix is /{entity_plural}\\n- health route stays compatible with the feature test",
      "constraints": "- keep the service self-contained and typed",
      "verify": "php vendor/bin/phpunit --configuration phpunit.xml"
    }
  ],
  "deps_to_install": [],
  "deps_dev": [],
  "test_command": "php vendor/bin/phpunit --configuration phpunit.xml",
  "lint_command": "php vendor/bin/pint --test"
}
