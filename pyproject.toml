[project]
name = "simplicio-cli"
version = "0.1.0"
description = "Pipeline portavel: mapper + precedente + prompt em camadas + verify loop"
requires-python = ">=3.9"
dependencies = ["sentence-transformers", "numpy", "anthropic", "openai"]

[project.scripts]
simplicio = "simplicio.cli:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
